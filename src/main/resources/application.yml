spring:
  application:
    name: dental-clinic-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dental_clinic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: America/Lima
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:no-reply@local.test}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${PORT:8080}

logging:
  level:
    org.springframework.security: INFO
    com.clinica.dental: DEBUG

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:ZmFrZWZha2VmYWtlZmFrZWZha2VmYWtlZmFrZWZha2VmYWtlZmFrZQ==}
    refresh-secret: ${JWT_REFRESH_SECRET:cmVmcmVzaHJlZnJlc2hyZWZyZXNocmVmcmVzaHJlZnJlc2g=}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:30}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}
  notifications:
    mail-enabled: ${MAIL_ENABLED:false}
    dispatch-delay-ms: ${NOTIFICATION_DISPATCH_DELAY_MS:60000}
