version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: dental_clinic_postgres
    environment:
      POSTGRES_DB: dental_clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: dental_clinic_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
